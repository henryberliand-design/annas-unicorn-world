<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Anna's Unicorn World</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f8c8dc">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

    <!-- Start Screen -->
    <div id="start-screen">
        <div class="sparkles-bg" id="sparkles-bg"></div>
        <h1>Anna's Unicorn World</h1>
        <div class="tap-hint">Tap anywhere to start!</div>
    </div>

    <!-- Rotate device overlay (portrait mode) -->
    <div id="rotate-overlay">
        <div class="rotate-icon">📱</div>
        <p class="rotate-title">Please rotate your device!</p>
        <p class="rotate-hint">This game works best in landscape mode 🦄</p>
    </div>

    <!-- Game Canvas -->
    <canvas id="game-canvas"></canvas>

    <script>
        // Register service worker (before module script to start caching early)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(() => {});
        }
    </script>

    <script type="module">
        import { Game } from './js/engine/game.js';

        // ─── Decorative sparkle particles on start screen ───
        const sparklesContainer = document.getElementById('sparkles-bg');
        for (let i = 0; i < 20; i++) {
            const sparkle = document.createElement('div');
            sparkle.className = 'start-sparkle';
            const size = 4 + Math.random() * 12;
            sparkle.style.width = size + 'px';
            sparkle.style.height = size + 'px';
            sparkle.style.left = (Math.random() * 100) + '%';
            sparkle.style.top = (Math.random() * 100) + '%';
            sparkle.style.animationDuration = (2 + Math.random() * 4) + 's';
            sparkle.style.animationDelay = (Math.random() * 3) + 's';
            sparklesContainer.appendChild(sparkle);
        }

        // ─── Orientation detection & canvas resize ───
        const canvas = document.getElementById('game-canvas');
        const rotateOverlay = document.getElementById('rotate-overlay');
        const GAME_W = 1920, GAME_H = 1080;
        const GAME_RATIO = GAME_W / GAME_H;

        function checkOrientation() {
            const vw = window.innerWidth;
            const vh = window.innerHeight;
            const isPortrait = vh > vw;

            // Show/hide rotate overlay
            rotateOverlay.style.display = isPortrait ? 'flex' : 'none';
            canvas.style.display = isPortrait ? 'none' : 'block';

            if (!isPortrait) {
                // Landscape — fit canvas maintaining 16:9
                let cw, ch;
                if (vw / vh > GAME_RATIO) {
                    // Wider than 16:9 → fit height, small side bars
                    ch = vh;
                    cw = vh * GAME_RATIO;
                } else {
                    // Narrower than 16:9 → fit width, small top/bottom bars
                    cw = vw;
                    ch = vw / GAME_RATIO;
                }
                canvas.style.width = cw + 'px';
                canvas.style.height = ch + 'px';
            }
        }

        checkOrientation();
        window.addEventListener('resize', checkOrientation);
        screen.orientation?.addEventListener('change', () => {
            setTimeout(checkOrientation, 100); // slight delay for dimensions to settle
        });

        // Try to lock landscape (works in fullscreen / PWA)
        try { screen.orientation.lock('landscape').catch(() => {}); } catch(e) {}

        // ─── Start on tap ───
        const startScreen = document.getElementById('start-screen');
        let gameStarted = false;

        startScreen.addEventListener('click', startGame);
        startScreen.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startGame();
        }, { passive: false });

        async function startGame() {
            if (gameStarted) return;
            gameStarted = true;

            try {
                await document.documentElement.requestFullscreen();
                // Try landscape lock again after fullscreen (more likely to work)
                try { await screen.orientation.lock('landscape'); } catch(e) {}
            } catch (e) { /* fullscreen not supported — fine */ }

            // Re-calc after fullscreen/orientation change
            setTimeout(checkOrientation, 150);

            startScreen.classList.add('hidden');
            const game = new Game(canvas);
            game.start();
            window.game = game;
        }
    </script>

</body>
</html>
